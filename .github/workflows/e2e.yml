name: E2E Tests

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: resonance
          POSTGRES_PASSWORD: resonance_ci
          POSTGRES_DB: resonance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resonance -d resonance_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://resonance:resonance_ci@localhost:5432/resonance_test"
      AUTH_SECRET: "ci-e2e-placeholder-secret-000000000000"
      OPENAI_API_KEY: "sk-ci-placeholder"
      FIRECRAWL_API_KEY: "fc-ci-placeholder"

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Push database schema
        run: pnpm db:push

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
