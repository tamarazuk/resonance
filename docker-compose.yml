services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: resonance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resonance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resonance_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-resonance_dev}
    ports:
      - "5432:5432"
    volumes:
      # PG18+ stores versioned data directories under /var/lib/postgresql.
      - postgres_data:/var/lib/postgresql
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-resonance} -d ${POSTGRES_DB:-resonance_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
