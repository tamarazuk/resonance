services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resonance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: resonance
      POSTGRES_PASSWORD: resonance_dev_password
      POSTGRES_DB: resonance_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resonance -d resonance_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
